# Jekyll configuration for GitHub Pages. test
title: Booking Automotive Documentation
description: >-
  Documentation, API guides, industry benchmarks, and free open-source tools
  for auto repair shop owners and developers using Booking Automotive.
baseurl: "/auto-repair-shop-software"
url: "https://wiki-help.github.io"
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Author info for SEO
author:
  name: Booking Automotive
  email: service@bookingautomotive.com

# Social links
social:
  name: Booking Automotive
  links:
    - https://bookingautomotive.com

# Defaults for all pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Exclude from processing
exclude:
  - .DS_Store
  - sitemap.xml
